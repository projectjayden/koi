version: "3.8"

services:
  # Python ML Service
  ml-service:
    build: ./ml
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./ml/t5Model:/app/t5Model # Mount your model
    networks:
      - koi-network

  # Rust Backend API
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      ml-service:
        condition: service_healthy
    environment:
      # TODO: figure out how to use env
      - ML_SERVICE_URL=http://ml-service:8001
      - DATABASE_URL=your_sql_server_connection_string
    networks:
      - koi-network

networks:
  koi-network:
    driver: bridge
